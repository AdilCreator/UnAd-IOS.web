<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Web Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #editor-canvas:focus { outline: none; }
        .toolbar-btn {
            @apply p-2 hover:bg-gray-700 rounded transition-colors text-white font-bold;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">

    <!-- Sticky Toolbar -->
    <nav class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-5xl mx-auto flex flex-wrap items-center gap-4">
            <h1 class="text-xl font-black tracking-tighter mr-6 text-blue-400">EDIT_OS</h1>
            
            <div class="flex bg-gray-900 rounded-lg p-1 border border-gray-600">
                <button onclick="execCmd('bold')" class="toolbar-btn" title="Bold">B</button>
                <button onclick="execCmd('italic')" class="toolbar-btn italic" title="Italic">I</button>
                <button onclick="execCmd('underline')" class="toolbar-btn underline" title="Underline">U</button>
            </div>

            <div class="flex bg-gray-900 rounded-lg p-1 border border-gray-600">
                <button onclick="execCmd('justifyLeft')" class="toolbar-btn">Left</button>
                <button onclick="execCmd('justifyCenter')" class="toolbar-btn">Center</button>
                <button onclick="execCmd('justifyRight')" class="toolbar-btn">Right</button>
            </div>

            <button onclick="saveContent()" class="ml-auto bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-full font-bold transition-all shadow-lg shadow-blue-900/20">
                Save Changes
            </button>
        </div>
    </nav>

    <!-- Editable Area -->
    <main class="flex-grow p-8">
        <div 
            id="editor-canvas" 
            contenteditable="true" 
            class="max-w-4xl mx-auto bg-white text-gray-800 p-12 min-h-[60vh] rounded-2xl shadow-2xl overflow-hidden"
        >
            <h2 class="text-4xl font-bold mb-4">Click anywhere to start editing!</h2>
            <p class="text-lg text-gray-600">You can highlight text to style it, delete this paragraph, or even paste images. Everything inside this white box is live-editable.</p>
            <br>
            <div class="p-6 bg-blue-50 border-l-4 border-blue-500 rounded">
                <p class="italic text-blue-700">"This is a pre-styled block. You can change the text here too!"</p>
            </div>
        </div>
    </main>

    <!-- Footer Stats -->
    <footer class="p-4 text-center text-gray-500 text-sm">
        Mode: <span class="text-green-400">Live Edit</span> | Powered by Gemini
    </footer>

    <script>
        // Function to execute editor commands
        function execCmd(command) {
            document.execCommand(command, false, null);
        }

        // Save functionality (to local storage)
        function saveContent() {
            const content = document.getElementById('editor-canvas').innerHTML;
            localStorage.setItem('web_content', content);
            alert('Progress saved to your browser cache!');
        }

        // Load saved content on refresh
        window.onload = () => {
            const saved = localStorage.getItem('web_content');
            if (saved) {
                document.getElementById('editor-canvas').innerHTML = saved;
            }
        };
    </script>
</body>
</html>
