<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockMaster OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .block-wrapper:hover .controls { opacity: 1; transform: translateX(0); }
        .controls { opacity: 0; transform: translateX(-10px); transition: all 0.2s; }
        [contenteditable="true"]:focus { outline: none; box-shadow: inset 0 -2px 0 #3b82f6; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <!-- Admin Control Panel -->
    <nav class="glass border-b border-slate-200 p-4 sticky top-0 z-50 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg shadow-blue-200">B</div>
            <h1 class="font-extrabold text-slate-800 tracking-tight">BLOCK<span class="text-blue-600">MASTER</span></h1>
        </div>

        <div id="admin-tools" class="hidden flex items-center gap-4">
            <div class="h-6 w-[1px] bg-slate-300 mx-2"></div>
            <button onclick="addBlock('text')" class="hover:text-blue-600 font-medium text-sm text-slate-500">+ Text</button>
            <button onclick="addBlock('image')" class="hover:text-blue-600 font-medium text-sm text-slate-500">+ Image</button>
            <button onclick="addBlock('button')" class="hover:text-blue-600 font-medium text-sm text-slate-500">+ Button</button>
            <button onclick="publish()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full text-sm font-bold shadow-md transition-all active:scale-95">Publish to Web</button>
        </div>

        <button id="auth-btn" onclick="authenticate()" class="bg-slate-800 text-white px-5 py-2 rounded-full text-sm font-bold">Admin Login</button>
    </nav>

    <!-- Canvas Area -->
    <div id="main-canvas" class="max-w-4xl mx-auto py-20 px-6 space-y-8">
        <!-- Dynamic Blocks Loaded Here -->
    </div>

    <!-- Scripting Logic -->
    <script>
        let isAdmin = false;
        const SECRET = "admin123"; // Change this!

        function authenticate() {
            const pass = prompt("Enter Master Password:");
            if (pass === SECRET) {
                isAdmin = true;
                document.getElementById('admin-tools').classList.remove('hidden');
                document.getElementById('auth-btn').innerText = "Logout";
                document.getElementById('auth-btn').onclick = () => location.reload();
                refreshEditorState();
            } else {
                alert("Unauthorized Access.");
            }
        }

        function addBlock(type) {
            const canvas = document.getElementById('main-canvas');
            const wrapper = document.createElement('div');
            wrapper.className = "block-wrapper relative group p-4 rounded-2xl hover:bg-white hover:shadow-xl transition-all border border-transparent hover:border-slate-100";
            
            let content = "";
            if (type === 'text') {
                content = `<h2 contenteditable="true" class="text-3xl font-bold text-slate-800 mb-2">Heading</h2>
                           <p contenteditable="true" class="text-slate-500 leading-relaxed text-lg">Click to write something amazing...</p>`;
            } else if (type === 'image') {
                const url = prompt("Image URL:", "https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=800&q=80");
                content = `<img src="${url}" class="w-full h-auto rounded-2xl shadow-lg border border-slate-200">`;
            } else if (type === 'button') {
                content = `<div class="flex justify-center py-4">
                             <a href="#" contenteditable="true" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold shadow-blue-200 shadow-lg hover:scale-105 transition-transform">Click Me</a>
                           </div>`;
            }

            wrapper.innerHTML = `
                <div class="controls absolute -left-16 top-1/2 -translate-y-1/2 flex flex-col gap-2">
                    <button onclick="this.closest('.block-wrapper').remove()" class="w-10 h-10 bg-white shadow-md rounded-full flex items-center justify-center text-red-500 hover:bg-red-50">✕</button>
                </div>
                <div class="content-area">${content}</div>
            `;
            canvas.appendChild(wrapper);
        }

        function refreshEditorState() {
            const editables = document.querySelectorAll('[contenteditable]');
            editables.forEach(el => el.contentEditable = isAdmin);
        }

        async function publish() {
            const content = document.getElementById('main-canvas').innerHTML;
            
            // LOGIC FOR SAVING TO EVERYONE:
            // In a real app, you would use:
            // await fetch('https://your-api.com/save', { method: 'POST', body: content });
            
            localStorage.setItem('global_site_content', content);
            
            alert("🚀 SITE PUBLISHED! \n\nNote: To make this stay forever for other people, you must host this file on Netlify or Vercel and connect a Database like Supabase.");
        }

        window.onload = () => {
            const saved = localStorage.getItem('global_site_content');
            if (saved) {
                document.getElementById('main-canvas').innerHTML = saved;
            } else {
                // Default Welcome
                addBlock('text');
            }
            refreshEditorState();
        };
    </script>
</body>
</html>
